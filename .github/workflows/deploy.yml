name: Deploy to Render

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'project-log-md/**'
      - '.claude/**'

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    # นำ secret มาเป็น env ระดับ job — ห้ามอ้าง secrets ใน if: โดยตรง (parse ไม่ผ่าน)
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Deploy to Render
        # env ใช้ใน if: ได้ — ถ้าไม่ตั้ง secret ก็ข้าม step นี้แทนที่จะ fail
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK_URL" \
            --fail --silent --show-error
